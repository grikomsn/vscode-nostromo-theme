name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Validate theme files
      run: |
        # Basic JSON validation
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-dark-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-light-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-dark-modern-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-light-modern-color-theme.json'))"
        echo "Theme files are valid JSON"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Publish to VS Code Marketplace
      run: npm run deploy
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
