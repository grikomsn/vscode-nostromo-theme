name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Validate theme files
      run: |
        # Basic JSON validation
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-dark-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-light-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-dark-modern-color-theme.json'))"
        node -e "JSON.parse(require('fs').readFileSync('./themes/nostromo-light-modern-color-theme.json'))"
        echo "Theme files are valid JSON"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Update package.json version from tag
      run: |
        # Extract version from tag (refs/tags/v1.0.2 -> 1.0.2)
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Setting package.json version to: $VERSION"
        
        # Update version in package.json
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
          console.log('Updated package.json version to:', pkg.version);
        "
        
    - name: Publish to VS Code Marketplace
      run: npm run deploy
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
